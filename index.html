<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theory Coffee Roasters — Brand House</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,300;1,6..72,400;1,6..72,500&display=swap" rel="stylesheet">
    <style>
        :root {
            --copper: #D48A3C;
            --copper-bright: #E89F4C;
            --charcoal: #1A1A1A;
            --black: #111111;
            --white: #FFFFFF;
            --offwhite: #F8F6F3;
            --bone: #EEEBE6;
            --grey-300: #A09B94;
            --grey-400: #6E6A64;
            --font-sans: 'Jost', -apple-system, sans-serif;
            --font-serif: 'Newsreader', Georgia, serif;
            --ease: cubic-bezier(0.25, 1, 0.5, 1);
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; }
        body {
            font-family: var(--font-sans);
            background: var(--black);
            color: var(--white);
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            height: 100vh;
        }

        /* GRAIN */
        .grain {
            position: fixed; inset: 0; z-index: 9999;
            pointer-events: none; opacity: 0.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-repeat: repeat; background-size: 256px 256px;
        }

        /* LAYOUT */
        .gate {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            position: relative;
        }

        /* BACKGROUND IMAGE — subtle */
        .gate-bg {
            position: absolute;
            inset: 0;
            background: url('img/day 2,703 in the roastery  fyp baristadaily coffeeroaster coffeeshop b.jpg') center center / cover no-repeat;
            opacity: 0.08;
            filter: grayscale(60%);
        }

        /* CONTENT */
        .gate-content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 440px;
            padding: 0 24px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 1s var(--ease-out) 0.3s forwards;
        }

        /* LOGO MARK */
        .gate-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 40px;
            opacity: 0;
            animation: fadeIn 0.8s var(--ease-out) 0.1s forwards;
        }
        .gate-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
        }

        /* BRAND LINE */
        .gate-brand {
            font-size: 0.5625rem;
            font-weight: 800;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--copper);
            margin-bottom: 48px;
        }

        .gate-title {
            font-family: var(--font-sans);
            font-size: clamp(28px, 5vw, 42px);
            font-weight: 300;
            letter-spacing: -0.02em;
            line-height: 1.2;
            color: var(--white);
            margin-bottom: 8px;
        }
        .gate-title strong {
            font-weight: 700;
        }
        .gate-title em {
            font-family: var(--font-serif);
            font-style: italic;
            color: var(--copper-bright);
        }

        .gate-subtitle {
            font-size: 0.8125rem;
            color: var(--grey-400);
            margin-bottom: 48px;
            letter-spacing: 0.02em;
        }

        /* INPUT GROUP */
        .gate-form {
            position: relative;
            max-width: 320px;
            margin: 0 auto;
        }

        .gate-input-wrap {
            position: relative;
            margin-bottom: 16px;
        }

        .gate-input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--white);
            font-family: var(--font-sans);
            font-size: 0.9375rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            text-align: center;
            outline: none;
            transition: all 0.4s var(--ease);
        }

        .gate-input::placeholder {
            color: var(--grey-400);
            letter-spacing: 0.12em;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
        }

        .gate-input:focus {
            border-color: var(--copper);
            background: rgba(212, 138, 60, 0.04);
            box-shadow: 0 0 0 1px var(--copper);
        }

        .gate-submit {
            width: 100%;
            padding: 16px 20px;
            background: var(--copper);
            border: none;
            color: var(--black);
            font-family: var(--font-sans);
            font-size: 0.6875rem;
            font-weight: 800;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s var(--ease);
        }

        .gate-submit:hover {
            background: var(--copper-bright);
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(212, 138, 60, 0.3);
        }

        .gate-submit:active {
            transform: translateY(0);
        }

        /* ERROR STATE */
        .gate-error {
            margin-top: 16px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            color: #E85454;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .gate-error.visible {
            opacity: 1;
        }

        /* SUCCESS STATE */
        .gate-content.success {
            animation: successFade 0.6s var(--ease-out) forwards;
        }

        /* CORNER MARKS */
        .corner {
            position: fixed;
            width: 24px;
            height: 24px;
            opacity: 0.12;
            z-index: 1;
        }
        .corner svg { width: 100%; height: 100%; }
        .corner--tl { top: 32px; left: 32px; }
        .corner--tr { top: 32px; right: 32px; transform: rotate(90deg); }
        .corner--bl { bottom: 32px; left: 32px; transform: rotate(-90deg); }
        .corner--br { bottom: 32px; right: 32px; transform: rotate(180deg); }

        /* BOTTOM LINE */
        .gate-footer {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.5625rem;
            font-weight: 600;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.12);
            z-index: 2;
        }

        /* ANIMATIONS */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes successFade {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.98); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .shake {
            animation: shake 0.4s ease;
        }

        /* REVEAL OVERLAY — covers entire screen, fades out on success */
        .reveal-overlay {
            position: fixed;
            inset: 0;
            background: var(--black);
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s var(--ease);
        }
        .reveal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
    </style>
</head>
<body>

    <div class="grain" aria-hidden="true"></div>

    <!-- CORNER MARKS -->
    <div class="corner corner--tl"><svg viewBox="0 0 24 24" fill="none"><path d="M0 24V0h24" stroke="white" stroke-width="1"/></svg></div>
    <div class="corner corner--tr"><svg viewBox="0 0 24 24" fill="none"><path d="M0 24V0h24" stroke="white" stroke-width="1"/></svg></div>
    <div class="corner corner--bl"><svg viewBox="0 0 24 24" fill="none"><path d="M0 24V0h24" stroke="white" stroke-width="1"/></svg></div>
    <div class="corner corner--br"><svg viewBox="0 0 24 24" fill="none"><path d="M0 24V0h24" stroke="white" stroke-width="1"/></svg></div>

    <div class="gate">
        <div class="gate-bg"></div>

        <div class="gate-content" id="gate-content">
            <!-- LOGO -->
            <div class="gate-logo">
                <img src="img/THEORY%20COFFEE%20ROASTERS%20TAKES%20THE%20PODIUM%20AT%20THE%20US%20COFFEE%20ROASTING%20CHAM.png" alt="Theory Coffee Roasters">
            </div>

            <div class="gate-brand">Theory Coffee Roasters</div>

            <h1 class="gate-title"><strong>Brand House</strong></h1>
            <p class="gate-subtitle">This project is invite-only. Enter the password to continue.</p>

            <div class="gate-form">
                <div class="gate-input-wrap">
                    <input
                        type="password"
                        class="gate-input"
                        id="password"
                        placeholder="Password"
                        autocomplete="off"
                        spellcheck="false"
                    >
                </div>
                <button class="gate-submit" id="submit">Enter</button>
                <div class="gate-error" id="error">Incorrect password</div>
            </div>
        </div>
    </div>

    <div class="reveal-overlay" id="overlay"></div>

    <div class="gate-footer">Redding, California</div>

    <script>
        const PASS_HASH = 'a207c767';
        function simpleHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return (hash >>> 0).toString(16).padStart(8, '0');
        }

        const input = document.getElementById('password');
        const submit = document.getElementById('submit');
        const error = document.getElementById('error');
        const content = document.getElementById('gate-content');
        const overlay = document.getElementById('overlay');

        function attempt() {
            const val = input.value.trim();
            if (!val) return;

            if (simpleHash(val) === PASS_HASH) {
                sessionStorage.setItem('theory-auth', 'true');
                error.classList.remove('visible');
                overlay.classList.add('active');
                content.classList.add('success');
                setTimeout(() => {
                    window.location.href = 'theory-v6-zag.html';
                }, 700);
            } else {
                error.classList.add('visible');
                input.classList.add('shake');
                setTimeout(() => input.classList.remove('shake'), 400);
                input.value = '';
                input.focus();
            }
        }

        submit.addEventListener('click', attempt);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') attempt();
            error.classList.remove('visible');
        });

        // Auto-focus
        setTimeout(() => input.focus(), 800);

        // If already authed, skip gate
        if (sessionStorage.getItem('theory-auth') === 'true') {
            window.location.href = 'theory-v6-zag.html';
        }
    </script>
</body>
</html>
